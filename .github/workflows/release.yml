name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            goarch: amd64
          - os: linux
            arch: arm64
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o pkgsh_${{ matrix.os }}_${{ matrix.arch }} \
            ./cmd/pkgsh

      - name: Build .deb (amd64 only)
        if: matrix.arch == 'amd64'
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cp pkgsh_linux_amd64 pkgsh
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          mkdir -p dist/
          VERSION=${VERSION} nfpm package --packager deb --target dist/pkgsh_amd64.deb
          rm pkgsh

      - name: Generate checksums
        run: |
          sha256sum pkgsh_${{ matrix.os }}_${{ matrix.arch }} \
            >> checksums_${{ matrix.arch }}.txt
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            sha256sum dist/*.deb >> checksums_${{ matrix.arch }}.txt
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.arch }}
          path: |
            pkgsh_${{ matrix.os }}_${{ matrix.arch }}
            dist/*.deb
            checksums_${{ matrix.arch }}.txt

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Merge checksums
        run: cat checksums_*.txt > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            pkgsh_linux_amd64
            pkgsh_linux_arm64
            dist/*.deb
            SHA256SUMS.txt
